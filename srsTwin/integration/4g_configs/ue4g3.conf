#####################################################################
# srsUE #3 — LTE mode, TELUS 4G digital twin, 3-UE demo pair
#
#   UE3 UL REP  tcp://*:2023       <- enb3 UL REQ
#   UE3 DL REQ  -> tcp://10.53.2.23:2022  (enb3 DL REP)
#
# PLMN: 302/221 (TELUS Mobility Canada)
# IMSI: 302221000000003  (generated via realizer/gen_user_db.py, seed=7)
#####################################################################

[rf]
freq_offset     = 0
tx_gain         = 0
rx_gain         = 0
nof_antennas    = 1
continuous_tx   = yes
device_name     = zmq
device_args     = tx_port=tcp://*:2023,rx_port=tcp://10.53.2.23:2022,base_srate=11.52e6

[rat.eutra]
dl_earfcn   = 3350
nof_carriers = 1

[rat.nr]
nof_carriers = 0

[pcap]
enable          = none
mac_filename    = /tmp/ue4g_mac.pcap
nas_filename    = /tmp/ue4g_nas.pcap

[log]
all_level       = info
phy_lib_level   = none
rrc_level       = debug
nas_level       = debug
all_hex_limit   = 128
filename        = /tmp/ue4g.log
file_max_size   = -1

[usim]
mode = soft
algo = milenage
opc  = B10BECB5563BFC1E6F93427ECBC8FE29
k    = 27A0AEB3FEE9232F8AF2211F9EE491C5
imsi = 302221000000003
imei = 353490069873330

[rrc]
release     = 9
ue_category = 4

[nas]
apn = internet

[gw]
netns      =
ip_devname = tun_srsue4g
ip_netmask = 255.255.255.0

[gui]
enable = false
