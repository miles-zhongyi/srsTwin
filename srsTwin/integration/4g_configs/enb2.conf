#####################################################################
# srseNB #2 — TELUS 4G digital twin, 3-UE demo pair
# Independent cell (own ZMQ link), shares the same srsEPC as enb.conf.
# PLMN: 302/221 | Band 7 EARFCN 3350 (2680 MHz DL, 5 MHz / 25 PRBs)
# ZMQ:  DL REP tcp://*:2012  <- UE2 REQ
#       UL REQ -> tcp://10.53.2.15:2013  (UE2 UL REP)
# S1:   -> srsEPC at 10.53.2.2 (same core as pair 1)
#####################################################################

[enb]
enb_id        = 0x4992      # distinct from pair 1 (0x4991)
mcc           = 302
mnc           = 221
mme_addr      = 10.53.2.2
gtp_bind_addr = 10.53.2.13
s1c_bind_addr = 10.53.2.13
s1c_bind_port = 0
n_prb         = 25

[enb_files]
sib_config = /4g_configs/sib.conf
rr_config  = /4g_configs/rr.conf
rb_config  = /4g_configs/rb.conf

[rf]
tx_gain          = 0
rx_gain          = 0
device_name      = zmq
device_args      = fail_on_disconnect=true,tx_port=tcp://*:2012,rx_port=tcp://10.53.2.15:2013,id=enb2,base_srate=11.52e6

[pcap]
enable        = false
filename      = /tmp/enb_mac.pcap
s1ap_enable   = false
s1ap_filename = /tmp/enb_s1ap.pcap

[log]
all_level     = info
all_hex_limit = 32
rrc_level     = debug
s1ap_level    = debug
filename      = /tmp/enb.log
file_max_size = -1
