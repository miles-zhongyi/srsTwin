#####################################################################
# srsUE — LTE mode, TELUS 4G digital twin
#
#   UE UL REP  tcp://*:2003       ← eNB UL REQ
#   UE DL REQ  → tcp://10.53.2.3:2002  (eNB DL REP)
#
# PLMN: 302/221 (TELUS Mobility Canada)
# IMSI: 302221000000001  Ki/OPc: standard test credentials
#
# When RRC_TRACE_LTE_DIR is set (mounted 22_decoded volume), the
# entrypoint reads the first clean rrcConnectionRequest record and
# sets RRC_TRACE_M_TMSI / RRC_TRACE_CAUSE before launching srsue,
# so the live LTE attach carries real TELUS subscriber identity.
#####################################################################

[rf]
freq_offset     = 0
tx_gain         = 0
rx_gain         = 0
nof_antennas    = 1
continuous_tx   = yes
device_name     = zmq
device_args     = tx_port=tcp://*:2003,rx_port=tcp://10.53.2.3:2002,base_srate=11.52e6

[rat.eutra]
dl_earfcn   = 3350
nof_carriers = 1

[rat.nr]
nof_carriers = 0

[pcap]
enable          = none
mac_filename    = /tmp/ue4g_mac.pcap
nas_filename    = /tmp/ue4g_nas.pcap

[log]
all_level       = info
phy_lib_level   = none
rrc_level       = debug
nas_level       = debug
all_hex_limit   = 128
filename        = /tmp/ue4g.log
file_max_size   = -1

[usim]
mode = soft
algo = milenage
opc  = 63BFA50EE6523365FF14C1F45F88737D
k    = 00112233445566778899AABBCCDDEEFF
imsi = 302221000000001
imei = 353490069873310

[rrc]
release     = 9
ue_category = 4

[nas]
apn = internet

[gw]
netns      =
ip_devname = tun_srsue4g
ip_netmask = 255.255.255.0

[gui]
enable = false
