#####################################################################
# srsEPC — TELUS 4G LTE digital twin
# PLMN: 302/221 (TELUS Mobility Canada)
# Subnet: 10.53.2.x (parallel to 5G stack on 10.53.1.x)
#####################################################################

[mme]
mme_code       = 0x1a
mme_group      = 0x0001
tac            = 0x0007
mcc            = 302
mnc            = 221
full_net_name  = TELUS Mobility
short_net_name = TELUS
apn            = internet
mme_bind_addr  = 10.53.2.2
dns_addr       = 8.8.8.8
encryption_algo = EEA0
integrity_algo  = EIA1
paging_timer   = 2
request_imeisv = false

[hss]
db_file = /subscribers.csv

[spgw]
gtpu_bind_addr = 10.53.2.2
sgi_if_addr    = 172.16.0.1
sgi_if_name    = srs_spgw_sgi
max_paging_queue = 100

[pcap]
enable   = false
filename = /tmp/epc.pcap

[log]
all_level = info
filename  = /tmp/epc.log
