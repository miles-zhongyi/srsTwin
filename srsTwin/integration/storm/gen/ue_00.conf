#####################################################################
# srsUE storm slot 0 — ZMQ via IQ hub. Rendered by storm/generate.py.
#   UE UL REP  tcp://*:2001            ← hub REQ
#   UE DL REQ  → tcp://10.53.1.4:3000   (hub DL REP, slot 0)
# Keep the verified ZMQ-link settings (continuous_tx, 0 dB gains,
# coreset0_index 6, common SS2 + fallback DCI) — RF realism is injected
# in the hub channel model, NOT by changing gains here.
#####################################################################

[rf]
freq_offset = 0
tx_gain = 0
rx_gain = 0
srate = 11.52e6
nof_antennas = 1
continuous_tx = yes
device_name = zmq
device_args = tx_port=tcp://*:2001,rx_port=tcp://10.53.1.4:3000,base_srate=11.52e6

[rat.eutra]
dl_earfcn = 2850
nof_carriers = 0

[rat.nr]
bands = 3
nof_carriers = 1

[pcap]
enable = none
mac_filename = /tmp/ue_mac.pcap
mac_nr_filename = /tmp/ue_mac_nr.pcap
nas_filename = /tmp/ue_nas.pcap

[log]
all_level = info
phy_lib_level = none
rrc_level = debug
nas_level = debug
all_hex_limit = 128
filename = /tmp/ue.log
file_max_size = -1

[usim]
mode = soft
algo = milenage
opc  = 63bfa50ee6523365ff14c1f45f88737d
k    = 00112233445566778899aabbccddeeff
imsi = 001010123456780
imei = 353490069873319

[rrc]
release = 15
ue_category = 4

[nas]
apn = internet

[gw]
netns =
ip_devname = tun_srsue
ip_netmask = 255.255.255.0

[gui]
enable = false
