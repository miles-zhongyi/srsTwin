#
# End-to-end virtual 5G SA network (default: direct ZMQ, no hub).
#
#   srsUE  <==ZeroMQ IQ==>  OCUDU gNB/DU  <==N2/N3==>  Open5GS
#
# For the IQ hub (multi-UE), add the hub overlay:
#   docker compose -f docker-compose.yml -f docker-compose.hub.yml up -d 5gc gnb hub srsue
#
# Startup order (direct):  5gc -> gnb -> srsue
# Startup order (hub):     5gc -> gnb -> hub -> srsue [-> srsue2]

services:
  5gc:
    container_name: srstwin_5gc
    build:
      context: ../ocudu/docker/open5gs
      target: open5gs
      args:
        OS_VERSION: "22.04"
        OPEN5GS_VERSION: "v2.7.6"
    env_file:
      - ./open5gs.env
    volumes:
      - ./subscribers.csv:/subscribers.csv:ro
    privileged: true
    command: 5gc -c open5gs-5gc.yml
    healthcheck:
      test: ["CMD-SHELL", "nc -z 127.0.0.20 7777"]
      interval: 3s
      timeout: 1s
      retries: 60
    networks:
      ran:
        ipv4_address: 10.53.1.2

  gnb:
    container_name: srstwin_gnb
    build:
      context: ../ocudu
      dockerfile: ../integration/Dockerfile.gnb
    cap_add:
      - SYS_NICE
      - NET_ADMIN
    volumes:
      - ./gnb_zmq.direct.yml:/gnb_zmq.yml:ro
      - gnb-logs:/tmp
    depends_on:
      5gc:
        condition: service_healthy
    command: ["-c", "/gnb_zmq.yml"]
    networks:
      ran:
        ipv4_address: 10.53.1.3

  srsue:
    container_name: srstwin_ue
    build:
      context: ../srsRAN_4G
      dockerfile: ../integration/Dockerfile.ue
    cap_add:
      - NET_ADMIN
      - SYS_NICE
    devices:
      - /dev/net/tun
    environment:
      # Mount a 22_decoded subdirectory to inject real TELUS RRC identity.
      # The entrypoint scans it for the first RRC Connection Request record and
      # exports RRC_TRACE_M_TMSI / RRC_TRACE_CAUSE before launching srsue.
      # Remove or leave blank to use srsUE's internal random identity instead.
      RRC_TRACE_DIR: /22_decoded/00
    volumes:
      - ./ue_zmq.direct.conf:/ue_zmq.conf:ro
      - ue-logs:/tmp
      # Read-only bind-mount of the TELUS 22_decoded trace data.
      # Adjust the host path if the 22_decoded tree lives elsewhere.
      - ../22_decoded:/22_decoded:ro
    depends_on:
      - gnb
    command: ["/ue_zmq.conf"]
    networks:
      ran:
        ipv4_address: 10.53.1.5

volumes:
  gnb-logs:
  ue-logs:

networks:
  ran:
    ipam:
      driver: default
      config:
        - subnet: 10.53.1.0/24
